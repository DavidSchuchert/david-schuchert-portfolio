version: '3.8'

services:
  david-portfolio:
    build: .
    container_name: david-portfolio-app
    restart: unless-stopped
    ports:
      - "8486:4321"
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=4321
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
