version: '3.8'

services:
  david-portfolio-dev:
    image: node:20-alpine
    container_name: david-portfolio-dev
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "4321:4321"
    environment:
      - NODE_ENV=development
      - HOST=0.0.0.0
      - PORT=4321
    command: sh -c "npm install && npm run dev"
