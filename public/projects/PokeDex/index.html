<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>PokeDex</title>

    <!-- External CSS and JS -->
    <link rel="icon" type="image/x-icon" href="./img/pokeball.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" integrity="sha384-4bw+/aepP/YC94hEpVNVgiZdgIC5+VKNBQNGCHeKRQN+PtmoHDEXuppvnDJzQIu9" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js" integrity="sha384-HwwvtgBNo3bZJJLYd8oVXjrBZt8cqVSpeBNS5n7C8IVInixGAoxmnlMuBnhbgrkm" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400;1,500;1,600;1,700;1,800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Rubik+Iso&display=swap" rel="stylesheet">
    
    <!-- Local CSS and JS -->
    <link rel="stylesheet" href="style.css">
    <script src="script.js"></script>
</head>

<body id="body" onload="init()">
    <header>
        <nav class="navbar bg-body-tertiary">
            <div class="container-fluid">
                <div class="header_left">
                    <img src="./img/pokeball.png" alt="Logo" width="60" height="60" class="d-inline-block align-text-top logo_img">
                    <h1>PokeDex</h1>
                </div>
                <input class="inputsearch" type="text" id="inputsearch" placeholder="Search Pokemon" oninput="handleSearchInput(this)">
            </div>
        </nav>
    </header>

    <div class="mainbody">
        <!-- Loading Spinner -->
        <div class="loading" id="loading">
            <img id="loading_img" src="./img/pokeball.png" alt="">
            <span class="loading_text">Loading...</span>
        </div>

        <!-- Fullscreen Card -->
        <div onclick="closePokemonCard()" class="fullscreen_card" id="fullScreenCard" style="display:none">
            <div class="fullscreen_card_small">
                <img src="./img/1.png" alt="">
                <div class="line">
                    <div class="card_buttons">
                        <button type="button" class="btn btn-primary">Type</button>
                        <button type="button" class="btn btn-primary">Stats</button>
                        <button type="button" class="btn btn-primary">Start Abilitys</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div onclick="openTypeMenu()" class="arrow">
            <img id="arrow" src="./img/arrow.avif" alt="">
        </div>
        <div class="buttonbar" id="buttonbar">
            <div class="typeButtons" id="typeButtons"></div>
        </div>
        <div class="body_for_cards" id="bodyMainCards">
            <!-- Add Card via Script -->
        </div>
    </div>

    <button onclick="loadMorePkmn()" id="loadMorePkmn" class="loadmorebutton">
        <img src="./img/pokeballs.png" alt=""> Scroll/Press to Get More Pokemon! 
    </button>
</body>

</html>
